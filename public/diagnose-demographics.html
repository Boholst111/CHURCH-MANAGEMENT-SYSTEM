<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demographics Issue Diagnosis</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 1400px;
            margin: 20px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 {
            color: #333;
            border-bottom: 3px solid #667eea;
            padding-bottom: 15px;
            margin-bottom: 30px;
        }
        h2 {
            color: #667eea;
            margin-top: 30px;
            margin-bottom: 15px;
        }
        .test-section {
            background: #f8f9fa;
            padding: 20px;
            margin: 15px 0;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        .status {
            padding: 12px 20px;
            margin: 10px 0;
            border-radius: 6px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 2px solid #c3e6cb;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
        }
        .warning {
            background-color: #fff3cd;
            color: #856404;
            border: 2px solid #ffeaa7;
        }
        .info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 2px solid #bee5eb;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            margin: 10px 5px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        button:disabled {
            background: #cccccc;
            cursor: not-allowed;
            transform: none;
        }
        pre {
            background-color: #2d2d2d;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
            max-height: 400px;
            overflow-y: auto;
            font-size: 13px;
            line-height: 1.5;
        }
        .icon {
            font-size: 20px;
        }
        .step-number {
            display: inline-block;
            width: 30px;
            height: 30px;
            background: #667eea;
            color: white;
            border-radius: 50%;
            text-align: center;
            line-height: 30px;
            font-weight: bold;
            margin-right: 10px;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .solution-box {
            background: #e7f3ff;
            border: 2px solid #2196F3;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }
        .solution-box h3 {
            color: #2196F3;
            margin-top: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Demographics Issue Diagnosis Tool</h1>
        
        <div class="test-section">
            <h2><span class="step-number">1</span>Authentication Check</h2>
            <div id="authCheck">
                <div class="status info">
                    <span class="loading"></span>
                    <span>Checking authentication...</span>
                </div>
            </div>
        </div>

        <div class="test-section">
            <h2><span class="step-number">2</span>API Endpoint Test</h2>
            <button id="testApiBtn" onclick="testAPI()">Run API Test</button>
            <div id="apiTest"></div>
        </div>

        <div class="test-section">
            <h2><span class="step-number">3</span>Data Structure Validation</h2>
            <div id="dataValidation"></div>
        </div>

        <div class="test-section">
            <h2><span class="step-number">4</span>React Component Simulation</h2>
            <button onclick="simulateReactComponent()">Simulate React Logic</button>
            <div id="reactSimulation"></div>
        </div>

        <div id="solutionBox" style="display: none;"></div>
    </div>

    <script>
        let apiResponseData = null;

        // Run auth check on load
        window.addEventListener('DOMContentLoaded', () => {
            checkAuthentication();
        });

        function checkAuthentication() {
            const authCheckDiv = document.getElementById('authCheck');
            const token = localStorage.getItem('token');
            const user = localStorage.getItem('user');
            
            if (!token || !user) {
                authCheckDiv.innerHTML = `
                    <div class="status error">
                        <span class="icon">❌</span>
                        <div>
                            <strong>Not Authenticated</strong><br>
                            Please <a href="/login">login</a> first to use this diagnostic tool.
                        </div>
                    </div>
                `;
                document.getElementById('testApiBtn').disabled = true;
                return false;
            }

            try {
                const userData = JSON.parse(user);
                authCheckDiv.innerHTML = `
                    <div class="status success">
                        <span class="icon">✅</span>
                        <div>
                            <strong>Authenticated Successfully</strong><br>
                            User: ${userData.name} (${userData.role})<br>
                            Token: ${token.substring(0, 30)}...
                        </div>
                    </div>
                `;
                return true;
            } catch (e) {
                authCheckDiv.innerHTML = `
                    <div class="status error">
                        <span class="icon">❌</span>
                        <div>
                            <strong>Invalid User Data</strong><br>
                            Token exists but user data is corrupted. Please log out and log back in.
                        </div>
                    </div>
                `;
                return false;
            }
        }

        async function testAPI() {
            const apiTestDiv = document.getElementById('apiTest');
            const token = localStorage.getItem('token');
            
            apiTestDiv.innerHTML = `
                <div class="status info">
                    <span class="loading"></span>
                    <span>Testing API endpoint...</span>
                </div>
            `;
            
            try {
                console.log('[API TEST] Making request to /api/reports/demographics');
                
                const response = await fetch('/api/reports/demographics', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/json'
                    }
                });
                
                console.log('[API TEST] Response status:', response.status);
                
                const responseText = await response.text();
                console.log('[API TEST] Response text:', responseText);
                
                let data;
                try {
                    data = JSON.parse(responseText);
                    apiResponseData = data; // Store for later tests
                } catch (e) {
                    throw new Error(`Invalid JSON response: ${responseText}`);
                }
                
                if (response.ok) {
                    apiTestDiv.innerHTML = `
                        <div class="status success">
                            <span class="icon">✅</span>
                            <div>
                                <strong>API Call Successful</strong><br>
                                Status: ${response.status} OK
                            </div>
                        </div>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                    
                    // Automatically run validation
                    validateDataStructure(data);
                } else {
                    apiTestDiv.innerHTML = `
                        <div class="status error">
                            <span class="icon">❌</span>
                            <div>
                                <strong>API Call Failed</strong><br>
                                Status: ${response.status}<br>
                                ${data.message || 'Unknown error'}
                            </div>
                        </div>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                    
                    showSolution(response.status);
                }
            } catch (error) {
                console.error('[API TEST] Error:', error);
                apiTestDiv.innerHTML = `
                    <div class="status error">
                        <span class="icon">❌</span>
                        <div>
                            <strong>Request Failed</strong><br>
                            ${error.message}
                        </div>
                    </div>
                    <pre>${error.stack || error.toString()}</pre>
                `;
            }
        }

        function validateDataStructure(response) {
            const validationDiv = document.getElementById('dataValidation');
            
            const checks = [];
            
            // Check response structure
            checks.push({
                name: 'Response has "success" key',
                passed: response.hasOwnProperty('success'),
                value: response.success
            });
            
            checks.push({
                name: 'Response has "data" key',
                passed: response.hasOwnProperty('data'),
                value: response.data ? 'Present' : 'Missing'
            });
            
            if (response.data) {
                const data = response.data;
                
                checks.push({
                    name: 'Data has "by_age"',
                    passed: data.hasOwnProperty('by_age'),
                    value: data.by_age ? `${Object.keys(data.by_age).length} age groups` : 'Missing'
                });
                
                checks.push({
                    name: 'Data has "by_location"',
                    passed: data.hasOwnProperty('by_location'),
                    value: data.by_location ? `${Object.keys(data.by_location).length} locations` : 'Missing'
                });
                
                checks.push({
                    name: 'Data has "total_members"',
                    passed: data.hasOwnProperty('total_members'),
                    value: data.total_members || 0
                });
                
                checks.push({
                    name: 'Data is not null',
                    passed: data !== null,
                    value: data !== null ? 'Valid' : 'Null'
                });
                
                checks.push({
                    name: 'Data is not empty',
                    passed: Object.keys(data).length > 0,
                    value: `${Object.keys(data).length} keys`
                });
            }
            
            let html = '<div style="margin-top: 15px;">';
            checks.forEach(check => {
                html += `
                    <div class="status ${check.passed ? 'success' : 'error'}">
                        <span class="icon">${check.passed ? '✅' : '❌'}</span>
                        <div>
                            <strong>${check.name}</strong><br>
                            Value: ${check.value}
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            
            validationDiv.innerHTML = html;
        }

        function simulateReactComponent() {
            const simulationDiv = document.getElementById('reactSimulation');
            
            if (!apiResponseData) {
                simulationDiv.innerHTML = `
                    <div class="status warning">
                        <span class="icon">⚠️</span>
                        <span>Please run the API test first (Step 2)</span>
                    </div>
                `;
                return;
            }
            
            // Simulate the exact logic from Reports.tsx and DemographicChart.tsx
            const data = apiResponseData.data; // This is what reportsApi.getDemographicReport() returns
            
            let html = '<div style="margin-top: 15px;">';
            
            // Check 1: Loading state
            html += `
                <div class="status info">
                    <span class="icon">ℹ️</span>
                    <div>
                        <strong>Loading State Check</strong><br>
                        loading = false (API call completed)
                    </div>
                </div>
            `;
            
            // Check 2: Data null check (from DemographicChart.tsx line 42)
            const isDataNull = !data;
            html += `
                <div class="status ${isDataNull ? 'error' : 'success'}">
                    <span class="icon">${isDataNull ? '❌' : '✅'}</span>
                    <div>
                        <strong>Data Null Check: if (!data)</strong><br>
                        Result: ${isDataNull ? 'TRUE (shows "No data available")' : 'FALSE (proceeds to render)'}
                    </div>
                </div>
            `;
            
            if (!isDataNull) {
                // Check 3: Age data transformation
                const ageData = Object.entries(data.by_age || {}).map(([name, value]) => ({
                    name,
                    value,
                }));
                
                html += `
                    <div class="status ${ageData.length > 0 ? 'success' : 'warning'}">
                        <span class="icon">${ageData.length > 0 ? '✅' : '⚠️'}</span>
                        <div>
                            <strong>Age Data Transformation</strong><br>
                            Transformed ${ageData.length} age groups for chart
                        </div>
                    </div>
                `;
                
                // Check 4: Location data transformation
                const locationData = Object.entries(data.by_location || {}).map(([name, value]) => ({
                    name,
                    value,
                }));
                
                html += `
                    <div class="status ${locationData.length > 0 ? 'success' : 'warning'}">
                        <span class="icon">${locationData.length > 0 ? '✅' : '⚠️'}</span>
                        <div>
                            <strong>Location Data Transformation</strong><br>
                            Transformed ${locationData.length} locations for chart
                        </div>
                    </div>
                `;
                
                // Final verdict
                if (ageData.length > 0 && locationData.length > 0) {
                    html += `
                        <div class="solution-box">
                            <h3>✅ React Component Should Work!</h3>
                            <p><strong>The data structure is correct and the React component logic should display the charts.</strong></p>
                            <p>If you're still seeing "No demographic data available" in the actual Reports page, the issue is likely:</p>
                            <ul>
                                <li><strong>Browser cache:</strong> Press Ctrl+Shift+R to hard refresh</li>
                                <li><strong>Old JavaScript:</strong> Clear browser cache completely</li>
                                <li><strong>React state issue:</strong> Check browser console for errors</li>
                                <li><strong>Different token:</strong> The Reports page might be using a different/expired token</li>
                            </ul>
                            <p><strong>Next Step:</strong> Open the Reports page, press F12, and check the Console and Network tabs for errors.</p>
                        </div>
                    `;
                }
            } else {
                html += `
                    <div class="solution-box">
                        <h3>❌ Data is Null or Undefined</h3>
                        <p>The React component is receiving null/undefined data, which triggers the "No data available" message.</p>
                        <p><strong>This should not happen</strong> since the API test shows data is being returned correctly.</p>
                        <p>Possible causes:</p>
                        <ul>
                            <li>Error in the API call that's being silently caught</li>
                            <li>The reportsApi.getDemographicReport() is not extracting data correctly</li>
                            <li>Authentication token is different between this test and the React app</li>
                        </ul>
                    </div>
                `;
            }
            
            html += '</div>';
            simulationDiv.innerHTML = html;
        }

        function showSolution(statusCode) {
            const solutionBox = document.getElementById('solutionBox');
            solutionBox.style.display = 'block';
            
            let solution = '';
            
            switch (statusCode) {
                case 401:
                    solution = `
                        <div class="solution-box">
                            <h3>🔐 Solution: Authentication Required</h3>
                            <p><strong>Your token is expired or invalid.</strong></p>
                            <ol>
                                <li>Log out from the application</li>
                                <li>Log back in with your credentials</li>
                                <li>Return to the Reports page</li>
                            </ol>
                        </div>
                    `;
                    break;
                case 403:
                    solution = `
                        <div class="solution-box">
                            <h3>🚫 Solution: Permission Denied</h3>
                            <p><strong>Your user role doesn't have permission to view reports.</strong></p>
                            <p>Required role: <code>staff</code> or <code>admin</code></p>
                            <p>Contact your administrator to upgrade your role.</p>
                        </div>
                    `;
                    break;
                case 500:
                    solution = `
                        <div class="solution-box">
                            <h3>⚠️ Solution: Server Error</h3>
                            <p><strong>The server encountered an error processing your request.</strong></p>
                            <p>Check the Laravel logs at: <code>storage/logs/laravel.log</code></p>
                        </div>
                    `;
                    break;
            }
            
            solutionBox.innerHTML = solution;
        }
    </script>
</body>
</html>
