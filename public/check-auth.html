<!DOCTYPE html>
<html>
<head>
    <title>Check Authentication</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        pre { background: #f4f4f4; padding: 10px; border-radius: 5px; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <h1>Authentication Check</h1>
    <div id="result"></div>

    <script>
        const token = localStorage.getItem('token');
        const user = localStorage.getItem('user');
        
        const resultDiv = document.getElementById('result');
        
        if (token) {
            resultDiv.innerHTML = `
                <h2 class="success">✓ Token Found</h2>
                <p><strong>Token:</strong> ${token.substring(0, 20)}...</p>
                ${user ? `<p><strong>User:</strong></p><pre>${user}</pre>` : '<p class="error">No user data found</p>'}
                <button onclick="testAuth()">Test Authentication</button>
                <div id="test-result"></div>
            `;
        } else {
            resultDiv.innerHTML = `
                <h2 class="error">✗ No Token Found</h2>
                <p>You are not logged in. Please <a href="/login">login</a> first.</p>
            `;
        }
        
        async function testAuth() {
            const testResultDiv = document.getElementById('test-result');
            testResultDiv.innerHTML = '<p>Testing...</p>';
            
            try {
                const response = await fetch('/api/user', {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json',
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                const data = await response.json();
                
                testResultDiv.innerHTML = `
                    <h3 class="${response.ok ? 'success' : 'error'}">
                        Auth Test: ${response.status} ${response.statusText}
                    </h3>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                testResultDiv.innerHTML = `
                    <h3 class="error">Error:</h3>
                    <pre>${error.message}</pre>
                `;
            }
        }
    </script>
</body>
</html>
